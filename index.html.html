<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Guru Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #111b21; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { background: #dcf8c6; align-self: flex-end; color: #111; border-bottom-right-radius: 2px; }
        .ai { background: #fff; align-self: flex-start; color: #111; border-bottom-left-radius: 2px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="bg-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white"><i class="fa-solid fa-robot"></i></div>
            <h1 class="font-bold text-slate-800">Pocket Guru Pro</h1>
        </div>
        <span class="text-green-600 text-[10px] font-bold uppercase tracking-tighter">● Online</span>
    </header>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 bg-[#efeae2]"></div>

    <div class="p-4 bg-white border-t flex gap-2">
        <input id="user-input" class="flex-1 bg-slate-100 px-4 py-2 rounded-full outline-none text-sm" placeholder="Poochiye Beta...">
        <button id="send-btn" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        let history = [];

        async function send() {
            const text = userInput.value.trim();
            if(!text) return;
            append('user', text);
            userInput.value = '';
            history.push({ role: "user", content: text });

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                append('ai', reply);
                history.push({ role: "assistant", content: reply });
            } catch (e) {
                append('ai', "Beta, system busy hai. Try again!");
            }
        }

        function append(role, text) {
            const d = document.createElement('div');
            d.className = `bubble ${role === 'user' ? 'user' : 'ai'}`;
            d.innerHTML = marked.parse(text);
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('send-btn').onclick = send;
        userInput.onkeydown = (e) => { if(e.key === 'Enter') send(); };
        window.onload = () => append('ai', "नमस्ते बेटा! 🙏 मैं हूँ आपका **पॉकेट गुरु**। क्या पढ़ना है आज?");
    </script>
</body>
</html>

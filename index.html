<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Guru – Universal AI Study Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Scrollbar styles */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Typing Indicator Animation */
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
            margin: 0 2px;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Markdown rendering styles */
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body a { color: #2563eb; text-decoration: underline; font-weight: 500; }
        .markdown-body strong { font-weight: 700; color: inherit; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body code { background: #e5e7eb; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.85em; color: #ef4444; }
        .markdown-body pre { background: #1f2937; color: #f8fafc; padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 0.75em; }
        .markdown-body pre code { background: transparent; color: inherit; padding: 0; }
    </style>
</head>
<body class="bg-[#f0f2f5] h-screen flex overflow-hidden font-sans text-gray-800">

    <aside class="w-64 bg-gray-900 text-white flex flex-col transition-all duration-300 md:relative absolute z-20 h-full" id="sidebar" style="transform: translateX(0%);">
        <div class="p-4 flex items-center justify-between border-b border-gray-700">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap text-blue-400"></i> Pocket Guru
            </h1>
            <button id="closeSidebarBtn" class="md:hidden text-gray-400 hover:text-white">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>

        <div class="p-4">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition">
                <i class="fa-solid fa-plus"></i> New Chat
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-2 space-y-1" id="chatHistoryList"></div>

        <div class="p-4 border-t border-gray-700">
            <button onclick="openSettings()" class="w-full flex items-center gap-3 text-gray-300 hover:text-white hover:bg-gray-800 p-2 rounded-lg transition">
                <i class="fa-solid fa-cog"></i> Settings
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen w-full overflow-hidden relative">
        <header class="bg-white shadow-sm px-4 py-3 flex items-center gap-3 z-10 border-b">
            <button id="openSidebarBtn" class="md:hidden text-gray-600 hover:text-gray-900 text-xl">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="flex flex-col">
                <span class="font-bold text-gray-800 text-lg">Pocket Guru</span>
                <span class="text-xs text-green-500 font-medium"><i class="fa-solid fa-circle text-[8px] mr-1"></i>Online - AI Study Assistant</span>
            </div>
        </header>

        <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
            </div>

        <div class="w-full bg-white border-t border-gray-200 p-4">
            <div class="max-w-4xl mx-auto bg-gray-50 rounded-2xl border border-gray-200 p-2 flex items-end gap-2 relative shadow-sm">
                <textarea id="userInput" rows="1" class="w-full max-h-32 resize-none bg-transparent outline-none py-3 px-4 text-gray-800" placeholder="Type your question here (e.g. Newton law video do)..."></textarea>
                <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl w-12 h-12 flex items-center justify-center transition-transform hover:scale-105 disabled:opacity-50 disabled:hover:scale-100 flex-shrink-0 mb-1 mr-1">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <div class="text-center text-[10px] text-gray-400 mt-2">
                Pocket Guru makes mistakes. Verify important information.
            </div>
        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 backdrop-blur-sm px-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-sliders mr-2"></i>API Settings</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-800"><i class="fa-solid fa-times text-lg"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">OpenRouter API Key</label>
                    <input type="password" id="apiKeyInput" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Model Name</label>
                    <input type="text" id="modelInput" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="e.g. google/gemini-2.5-flash">
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg transition">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-lg transition">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are "Pocket Guru", a caring, highly intelligent AI study assistant for school students. Respond in Hinglish...`;

        let chats = JSON.parse(localStorage.getItem('pocketGuru_chats')) || {};
        let currentChatId = localStorage.getItem('pocketGuru_currentChatId') || null;
        let apiKey = localStorage.getItem('pocketGuru_apiKey') || '';
        let modelName = localStorage.getItem('pocketGuru_modelName') || 'google/gemini-2.5-flash';

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatHistoryList = document.getElementById('chatHistoryList');
        const settingsModal = document.getElementById('settingsModal');
        const sidebar = document.getElementById('sidebar');

        function init() {
            if (!chats[currentChatId]) {
                createNewChat();
            } else {
                renderSidebar();
                renderChat(currentChatId);
            }
            
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                sendBtn.disabled = this.value.trim() === "";
            });

            userInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            sendBtn.addEventListener('click', handleSend);
            document.getElementById('openSidebarBtn').addEventListener('click', () => sidebar.style.transform = 'translateX(0%)');
            document.getElementById('closeSidebarBtn').addEventListener('click', () => sidebar.style.transform = 'translateX(-100%)');

            if(window.innerWidth < 768) sidebar.style.transform = 'translateX(-100%)';
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            chats[id] = { id: id, title: 'New Conversation', messages: [] };
            currentChatId = id;
            saveData();
            renderSidebar();
            renderChat(id);
        }

        function switchChat(id) {
            currentChatId = id;
            saveData();
            renderSidebar();
            renderChat(id);
        }

        function saveData() {
            localStorage.setItem('pocketGuru_chats', JSON.stringify(chats));
            localStorage.setItem('pocketGuru_currentChatId', currentChatId);
        }

        function renderSidebar() {
            chatHistoryList.innerHTML = '';
            const sortedChats = Object.values(chats).sort((a, b) => b.id.split('_')[1] - a.id.split('_')[1]);
            sortedChats.forEach(chat => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left truncate px-3 py-3 rounded-lg text-sm transition flex items-center gap-2 ${chat.id === currentChatId ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-gray-200'}`;
                btn.innerHTML = `<i class="fa-regular fa-message"></i> ${chat.title}`;
                btn.onclick = () => switchChat(chat.id);
                chatHistoryList.appendChild(btn);
            });
        }

        function renderChat(id) {
            chatContainer.innerHTML = '';
            appendMessageHTML('ai', `Namaste! 🙏 Main aapka <strong>Pocket Guru</strong> hoon. <br><br>Boliye, aaj hum kya padhein? 📚`, false);
            const session = chats[id];
            session.messages.forEach(msg => appendMessageHTML(msg.role, msg.content, false));
            scrollToBottom();
        }

        function appendMessageHTML(role, content, animate = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} group`;
            const bubble = document.createElement('div');
            if (role === 'user') {
                bubble.className = `max-w-[85%] md:max-w-[75%] rounded-2xl p-4 bg-[#e7f8e0] shadow-sm border border-[#cbeaa6] rounded-tr-none text-gray-800`;
                bubble.innerHTML = `<p class="whitespace-pre-wrap">${escapeHTML(content)}</p>`;
            } else {
                bubble.className = `max-w-[85%] md:max-w-[75%] rounded-2xl p-4 bg-white shadow-sm border border-gray-200 rounded-tl-none markdown-body relative`;
                bubble.innerHTML = content;
            }
            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);
            if(animate) scrollToBottom();
            return bubble;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !apiKey) return;
            userInput.value = '';
            userInput.style.height = 'auto';
            appendMessageHTML('user', text, true);
            const currentSession = chats[currentChatId];
            currentSession.messages.push({ role: 'user', content: text });
            saveData();
            // ... (rest of your API call logic)
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;','<': '&lt;','>': '&gt;',"'": '&#39;','"': '&quot;'}[tag]));
        }

        function openSettings() { settingsModal.classList.remove('hidden'); settingsModal.classList.add('flex'); }
        function closeSettings() { settingsModal.classList.add('hidden'); settingsModal.classList.remove('flex'); }
        function saveSettings() {
            apiKey = document.getElementById('apiKeyInput').value;
            modelName = document.getElementById('modelInput').value || 'google/gemini-2.5-flash';
            localStorage.setItem('pocketGuru_apiKey', apiKey);
            localStorage.setItem('pocketGuru_modelName', modelName);
            closeSettings();
        }

        window.onload = init;
    </script>
</body>
</html>

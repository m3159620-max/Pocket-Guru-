<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Guru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .markdown-body p { margin-bottom: 0.8em; }
        .typing-indicator span { display: inline-block; width: 5px; height: 5px; background: #94a3b8; border-radius: 50%; animation: bounce 1.3s infinite; margin-right: 2px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex border-r border-slate-700">
        <div class="p-5 text-xl font-bold border-b border-slate-700 flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap text-blue-400"></i> Pocket Guru
        </div>
        <div class="p-4">
            <button onclick="createNewChat()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> New Chat
            </button>
        </div>
        <div class="flex-1 overflow-y-auto px-2 space-y-1" id="chatHistoryList">
            </div>
        <button onclick="openSettings()" class="p-4 hover:bg-slate-800 text-left flex items-center gap-3 border-t border-slate-700 text-gray-400 hover:text-white transition">
            <i class="fa-solid fa-gear"></i> Settings
        </button>
    </aside>

    <main class="flex-1 flex flex-col relative bg-white md:bg-gray-100">
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm z-10">
            <div class="font-bold text-lg flex items-center gap-2">
                <span class="md:hidden"><i class="fa-solid fa-bars"></i></span>
                Pocket Guru <span class="text-green-500 text-[10px] ml-2">● Online</span>
            </div>
            <button onclick="clearCurrentChat()" class="text-red-400 text-sm hover:text-red-600"><i class="fa-solid fa-trash"></i> Clear</button>
        </header>

        <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-6 pb-32">
            </div>

        <div class="absolute bottom-0 w-full p-4 bg-gradient-to-t from-gray-100 to-transparent">
            <div class="max-w-4xl mx-auto flex gap-2 items-end bg-white p-3 rounded-2xl shadow-xl border border-gray-200">
                <textarea id="userInput" rows="1" class="flex-1 p-2 outline-none resize-none max-h-40 text-gray-700" placeholder="Yahan apna sawal likhein beta..."></textarea>
                <button id="sendBtn" class="bg-blue-600 text-white w-12 h-11 rounded-xl hover:bg-blue-700 flex items-center justify-center transition-all shadow-md">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <p class="text-[10px] text-center mt-2 text-gray-400">Enter to send • Shift+Enter for new line</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl w-80 shadow-2xl scale-95 transition-all">
            <h2 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-key text-yellow-500"></i> API Settings</h2>
            <label class="text-xs text-gray-500 font-semibold">OPENROUTER KEY</label>
            <input type="password" id="keyInput" class="w-full border p-2 rounded-lg mb-4 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="sk-or-v1-...">
            <label class="text-xs text-gray-500 font-semibold">MODEL</label>
            <input type="text" id="modelInput" class="w-full border p-2 rounded-lg mb-5 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" value="google/gemini-2.0-flash-lite-preview-02-05:free">
            <div class="flex justify-end gap-3">
                <button onclick="closeSettings()" class="text-gray-400 text-sm font-medium">Cancel</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-lg">Save</button>
            </div>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('pg_memories')) || {};
        let currentChatId = localStorage.getItem('pg_last_chat') || '';
        let apiKey = localStorage.getItem('pg_key') || '';
        let model = localStorage.getItem('pg_model') || 'google/gemini-2.0-flash-lite-preview-02-05:free';

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const historyList = document.getElementById('chatHistoryList');

        function init() {
            if (!currentChatId || !chats[currentChatId]) {
                createNewChat();
            } else {
                renderSidebar();
                renderMessages();
            }
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            chats[id] = { id, title: 'New Conversation', messages: [] };
            currentChatId = id;
            updateApp();
        }

        function renderSidebar() {
            historyList.innerHTML = '';
            Object.values(chats).reverse().forEach(chat => {
                const btn = document.createElement('div');
                btn.className = `p-3 mb-1 rounded-lg text-sm cursor-pointer transition flex items-center gap-2 truncate ${chat.id === currentChatId ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30' : 'text-gray-400 hover:bg-slate-800'}`;
                btn.innerHTML = `<i class="fa-regular fa-message text-xs"></i> ${chat.title}`;
                btn.onclick = () => { currentChatId = chat.id; updateApp(); };
                historyList.appendChild(btn);
            });
        }

        function renderMessages() {
            chatBox.innerHTML = '';
            appendMsg('ai', "Namaste Beta! Main Pocket Guru hoon, aapki madad karne ke liye yahan hoon. Aaj aaj main kaise madad kar sakta hoon?");
            chats[currentChatId].messages.forEach(m => appendMsg(m.role, m.content));
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !apiKey) { if(!apiKey) openSettings(); return; }

            userInput.value = '';
            userInput.style.height = 'auto';
            
            // First message sets the title
            if (chats[currentChatId].messages.length === 0) {
                chats[currentChatId].title = text.substring(0, 25) + '...';
            }

            chats[currentChatId].messages.push({ role: 'user', content: text });
            updateApp();

            const loader = document.createElement('div');
            loader.className = "flex justify-start";
            loader.innerHTML = `<div class="bg-white p-4 rounded-xl shadow-sm border"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatBox.appendChild(loader);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: "system", content: "You are Pocket Guru, a helpful teacher. Always reply in Hinglish. Use 'Beta'." }, ...chats[currentChatId].messages]
                    })
                });

                const data = await res.json();
                loader.remove();

                if (data.choices) {
                    const aiMsg = data.choices[0].message.content;
                    chats[currentChatId].messages.push({ role: 'ai', content: aiMsg });
                    updateApp();
                }
            } catch (err) {
                loader.remove();
                appendMsg('ai', "Error: Beta connection check karo.");
            }
        }

        function appendMsg(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300`;
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl max-w-[85%] shadow-sm ${role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white border text-gray-800 rounded-tl-none markdown-body'}`;
            div.innerHTML = role === 'ai' ? marked.parse(content) : content;
            wrapper.appendChild(div);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateApp() {
            localStorage.setItem('pg_memories', JSON.stringify(chats));
            localStorage.setItem('pg_last_chat', currentChatId);
            renderSidebar();
            renderMessages();
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearCurrentChat() { if(confirm("Kya aap ye chat delete karna chahte hain?")) { delete chats[currentChatId]; createNewChat(); } }

        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        document.getElementById('sendBtn').onclick = sendMessage;

        function openSettings() { document.getElementById('modal').style.display = 'flex'; document.getElementById('keyInput').value = apiKey; }
        function closeSettings() { document.getElementById('modal').style.display = 'none'; }
        function saveSettings() {
            apiKey = document.getElementById('keyInput').value;
            model = document.getElementById('modelInput').value;
            localStorage.setItem('pg_key', apiKey);
            localStorage.setItem('pg_model', model);
            closeSettings();
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पॉकेट गुरु | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; overflow: hidden; font-family: sans-serif; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 15px; margin-bottom: 10px; font-size: 15px; line-height: 1.5; }
        .bubble.user { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.ai { background-color: white; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #ddd; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background: #efeae2; }
        .sidebar { w-64; background: #111b21; color: white; display: flex; flex-direction: column; border-right: 1px solid #222; }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>

    <aside class="sidebar w-64 hidden md:flex">
        <div class="p-4 bg-[#202c33] flex items-center gap-2 border-b border-slate-700">
            <i class="fa-solid fa-graduation-cap text-blue-400"></i>
            <span class="font-bold uppercase tracking-wider text-sm">पॉकेट गुरु</span>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto p-2">
            </div>
        <div class="p-4 text-center text-[10px] text-slate-500 border-t border-slate-700">SYSTEM ACTIVE</div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="bg-white p-3 border-b flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <h2 class="font-bold text-sm text-slate-800">पॉकेट गुरु</h2>
                    <span class="text-[10px] text-green-500 font-bold uppercase">● Online</span>
                </div>
            </div>
            <button onclick="window.location.reload()" class="text-xs bg-slate-100 px-3 py-1 rounded-full text-slate-500 hover:bg-red-50 transition">Reset</button>
        </header>

        <div id="chat-box">
            </div>

        <div class="p-4 bg-white border-t">
            <div class="max-w-4xl mx-auto flex items-center gap-2">
                <input type="text" id="user-input" class="flex-1 border rounded-xl px-4 py-3 outline-none focus:border-blue-500" placeholder="पूछो बेटा, क्या सीखना है?">
                <button id="send-btn" class="bg-blue-600 text-white w-12 h-12 rounded-xl hover:bg-blue-700 transition flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "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 
";
        const MODEL = "google/gemini-2.0-flash-lite-preview-02-05:free";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        // Welcome Message
        window.onload = () => {
            appendMsg('ai', "नमस्ते बेटा! 🙏 मैं हूँ आपका **पॉकेट गुरु**। आज आपको क्या पढ़ना है? गणित, विज्ञान या कुछ और?");
        };

        function appendMsg(role, content) {
            const div = document.createElement('div');
            div.className = `bubble ${role === 'user' ? 'user' : 'ai'}`;
            div.innerHTML = role === 'ai' ? marked.parse(content) : content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMsg('user', text);
            userInput.value = '';

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: "system", content: "You are Pocket Guru, a helpful AI tutor for students. Speak in Hindi/Hinglish and always call the user 'Beta'." },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                appendMsg('ai', reply);

            } catch (error) {
                appendMsg('ai', "❌ Sorry Beta, lagta hai internet ya API mein koi dikat hai.");
            }
        }

        document.getElementById('send-btn').onclick = sendMessage;
        userInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>

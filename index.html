<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Guru – Universal AI Study Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .typing-indicator span {
            display: inline-block;
            width: 6px; height: 6px;
            background-color: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
            margin: 0 2px;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body code { background: #e5e7eb; padding: 0.2em 0.4em; border-radius: 4px; color: #ef4444; }
        .markdown-body pre { background: #1f2937; color: #f8fafc; padding: 1em; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body class="bg-[#f0f2f5] h-screen flex overflow-hidden font-sans text-gray-800">

    <aside class="w-64 bg-gray-900 text-white flex flex-col transition-all duration-300 md:relative absolute z-20 h-full" id="sidebar">
        <div class="p-4 flex items-center justify-between border-b border-gray-700">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap text-blue-400"></i> Pocket Guru
            </h1>
            <button id="closeSidebarBtn" class="md:hidden text-gray-400"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="p-4">
            <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg transition">
                <i class="fa-solid fa-plus"></i> New Chat
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-2 space-y-1" id="chatHistoryList"></div>
        <div class="p-4 border-t border-gray-700">
            <button onclick="openSettings()" class="w-full flex items-center gap-3 text-gray-300 hover:text-white hover:bg-gray-800 p-2 rounded-lg transition">
                <i class="fa-solid fa-cog"></i> Settings
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="bg-white shadow-sm px-4 py-3 flex items-center gap-3 z-10">
            <button id="openSidebarBtn" class="md:hidden text-gray-600 text-xl"><i class="fa-solid fa-bars"></i></button>
            <div class="flex flex-col">
                <span class="font-bold text-gray-800 text-lg">Pocket Guru</span>
                <span class="text-xs text-green-500 font-medium"><i class="fa-solid fa-circle text-[8px] mr-1"></i>Online</span>
            </div>
        </header>

        <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 pb-24">
            </div>

        <div class="absolute bottom-0 w-full p-4 bg-gradient-to-t from-[#f0f2f5] via-[#f0f2f5] to-transparent">
            <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg border border-gray-200 p-2 flex items-end gap-2">
                <textarea id="userInput" rows="1" class="w-full max-h-32 resize-none bg-transparent outline-none py-3 px-4 text-gray-800" placeholder="Aapka sawal kya hai?"></textarea>
                <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl w-12 h-12 flex items-center justify-center flex-shrink-0 transition-all">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 backdrop-blur-sm px-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="px-6 py-4 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="text-lg font-bold">API Settings</h2>
                <button onclick="closeSettings()"><i class="fa-solid fa-times text-lg text-gray-400"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">OpenRouter API Key</label>
                    <input type="password" id="apiKeyInput" class="w-full border rounded-lg px-4 py-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Model Name</label>
                    <input type="text" id="modelInput" class="w-full border rounded-lg px-4 py-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="google/gemini-2.0-flash">
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 text-gray-600">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Save</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = "You are 'Pocket Guru', a teacher. Always reply in Hinglish. Use simple steps and words like 'Beta'.";
        
        let chats = JSON.parse(localStorage.getItem('pg_chats')) || {};
        let currentChatId = localStorage.getItem('pg_currentChatId');
        let apiKey = localStorage.getItem('pg_apiKey') || '';
        let modelName = localStorage.getItem('pg_modelName') || 'google/gemini-2.0-flash';

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const sidebar = document.getElementById('sidebar');

        function init() {
            if (!currentChatId || !chats[currentChatId]) {
                createNewChat();
            } else {
                renderSidebar();
                renderChat(currentChatId);
            }
            
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
            });

            sendBtn.addEventListener('click', handleSend);
            document.getElementById('openSidebarBtn').onclick = () => sidebar.style.transform = 'translateX(0%)';
            document.getElementById('closeSidebarBtn').onclick = () => sidebar.style.transform = 'translateX(-100%)';
            
            if(window.innerWidth < 768) sidebar.style.transform = 'translateX(-100%)';
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            chats[id] = { id, title: 'New Chat', messages: [] };
            currentChatId = id;
            saveData();
            renderSidebar();
            renderChat(id);
        }

        function renderSidebar() {
            const list = document.getElementById('chatHistoryList');
            list.innerHTML = '';
            Object.values(chats).reverse().forEach(chat => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left truncate px-3 py-3 rounded-lg text-sm transition flex items-center gap-2 ${chat.id === currentChatId ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-800'}`;
                btn.innerHTML = `<i class="fa-regular fa-message"></i> ${chat.title}`;
                btn.onclick = () => { currentChatId = chat.id; saveData(); renderSidebar(); renderChat(chat.id); };
                list.appendChild(btn);
            });
        }

        function renderChat(id) {
            chatContainer.innerHTML = '';
            appendMessageHTML('ai', "Namaste! 🙏 Main aapka <b>Pocket Guru</b> hoon. Boliye beta, aaj kya padhna hai?");
            chats[id].messages.forEach(msg => appendMessageHTML(msg.role, msg.content));
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendMessageHTML(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] rounded-2xl p-4 shadow-sm border ${role === 'user' ? 'bg-blue-50 border-blue-100 rounded-tr-none' : 'bg-white border-gray-200 rounded-tl-none markdown-body'}`;
            bubble.innerHTML = role === 'ai' ? marked.parse(content) : content;
            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return bubble;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !apiKey) { if(!apiKey) openSettings(); return; }

            userInput.value = '';
            userInput.style.height = 'auto';
            appendMessageHTML('user', text);
            
            const session = chats[currentChatId];
            if(session.messages.length === 0) { session.title = text.substring(0, 20); renderSidebar(); }
            session.messages.push({ role: 'user', content: text });

            const typing = document.createElement('div');
            typing.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(typing);

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [{ role: "system", content: SYSTEM_PROMPT }, ...session.messages]
                    })
                });
                
                const data = await response.json();
                typing.remove();
                
                if(data.choices && data.choices[0].message) {
                    const aiContent = data.choices[0].message.content;
                    appendMessageHTML('ai', aiContent);
                    session.messages.push({ role: 'ai', content: aiContent });
                    saveData();
                }
            } catch (e) {
                typing.remove();
                appendMessageHTML('ai', "❌ Sorry beta, lagta hai internet mein problem hai.");
            }
        }

        function saveData() {
            localStorage.setItem('pg_chats', JSON.stringify(chats));
            localStorage.setItem('pg_currentChatId', currentChatId);
        }

        function openSettings() { 
            document.getElementById('apiKeyInput').value = apiKey;
            document.getElementById('modelInput').value = modelName;
            document.getElementById('settingsModal').classList.remove('hidden'); 
            document.getElementById('settingsModal').classList.add('flex'); 
        }
        function closeSettings() { document.getElementById('settingsModal').classList.replace('flex', 'hidden'); }
        function saveSettings() {
            apiKey = document.getElementById('apiKeyInput').value;
            modelName = document.getElementById('modelInput').value;
            localStorage.setItem('pg_apiKey', apiKey);
            localStorage.setItem('pg_modelName', modelName);
            closeSettings();
        }

        window.onload = init;
    </script>
</body>
</html>

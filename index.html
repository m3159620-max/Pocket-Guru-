<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पॉकेट गुरु v3.1 | अपग्रेड वर्ज़न</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* WhatsApp-like message bubbles */
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            position: relative;
        }
        .bubble::after {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
        }
        .bubble.user {
            background-color: #dcf8c6;
            align-self: flex-end;
            border-top-right-radius: 0;
        }
        .bubble.user::after {
            border-width: 8px 0 0 8px;
            border-color: #dcf8c6 transparent transparent transparent;
            right: -8px;
            top: 0;
        }
        .bubble.ai {
            background-color: #fff;
            align-self: flex-start;
            border-top-left-radius: 0;
        }
        .bubble.ai::after {
            border-width: 0 0 8px 8px;
            border-color: transparent transparent transparent #fff;
            left: -8px;
            top: 0;
        }
        .message-icon {
            font-size: 1.25rem;
            margin-right: 8px;
            position: relative;
            top: 2px;
        }
        .user .message-icon {
            color: #25d366;
        }
        .ai .message-icon {
            color: #3b82f6;
        }
        .markdown-body p { margin-bottom: 0.8em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body a { color: #2563eb; text-decoration: underline; font-weight: 500; }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
            margin: 0 2px;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        /* Link Previews */
        .link-preview {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
            background-color: #f9fafb;
            display: flex;
            align-items: center;
            padding: 10px;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }
        .link-preview img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
        }
        .link-preview .details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .link-preview .title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #111827;
        }
        .link-preview .domain {
            font-size: 0.8rem;
            color: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans text-gray-800">

    <aside class="w-64 bg-gray-900 text-white flex flex-col justify-between hidden md:flex border-r border-gray-800">
        <div class="flex flex-col gap-4 p-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-graduation-cap text-3xl text-blue-400"></i>
                <span class="text-xl font-bold tracking-tight">पॉकेट गुरु</span>
            </div>
            <button onclick="createNewChat()" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-xl text-sm transition font-medium">
                <i class="fa-solid fa-plus"></i> न्यू चैट
            </button>
        </div>
        
        <div class="p-4 border-t border-gray-800">
            <button onclick="openSettings()" class="flex items-center gap-3 text-gray-400 hover:text-white hover:bg-gray-800 p-3 rounded-lg text-sm transition">
                <i class="fa-solid fa-cog text-lg"></i> सेटिंग्स
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative w-full">
        <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between z-10 sticky top-0 shadow-sm">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-graduation-cap text-3xl text-blue-500"></i>
                <div class="flex flex-col">
                    <span class="font-bold text-gray-800 text-lg">पॉकेट गुरु</span>
                    <span id="model-badge" class="text-[10px] text-slate-400 font-mono hidden md:block"></span>
                </div>
            </div>
            <button onclick="clearChat()" class="text-xs text-red-500 hover:text-red-700 font-medium"><i class="fa-solid fa-trash mr-1"></i>चैट साफ़ करें</button>
        </header>

        <div id="chat-list" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 pb-32">
            </div>
        
        <div id="typing-indicator" class="typing-indicator p-4 flex gap-2 items-center hidden relative left-[-8px]">
            <i class="fa-solid fa-graduation-cap message-icon text-blue-500"></i>
            <div><span></span><span></span><span></span></div>
        </div>

        <footer class="p-4 bg-gray-100 border-t border-gray-200 absolute bottom-0 w-full z-10">
            <div class="max-w-4xl mx-auto flex items-end bg-white rounded-2xl shadow-xl border border-gray-200 p-2">
                <textarea id="user-input" rows="1" class="flex-1 p-3 px-4 outline-none resize-none max-h-48 bg-transparent text-gray-700 leading-relaxed" placeholder="पूंछें बेटा, आज क्या पढ़ना है? (या 'गणित वीडियो' मांगें)..."></textarea>
                <div class="flex gap-1.5 p-1 mb-1 mr-1">
                    <button id="mic-btn" class="bg-blue-100 text-blue-600 w-11 h-10 rounded-xl hover:bg-blue-200 flex items-center justify-center transition" title="Microphone"><i class="fa-solid fa-microphone text-lg"></i></button>
                    <button id="send-btn" class="bg-blue-600 text-white w-12 h-11 rounded-xl hover:bg-blue-700 flex items-center justify-center shadow-lg transition active:scale-95" title="Send"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 backdrop-blur-sm px-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl animate-in zoom-in-95 duration-200 border border-slate-200">
            <h2 class="font-bold text-slate-800 text-lg mb-4 flex items-center gap-2"><i class="fa-solid fa-shield-halved text-blue-500"></i> API कॉन्फ़िगरेशन</h2>
            <p class="text-[10px] text-slate-400 font-mono mb-4 text-center">सुरक्षा के लिए, इसे हार्डकोड नहीं किया गया है।</p>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">OpenRouter API कीज़</label>
                    <input type="password" id="api-key-input" class="w-full border border-slate-200 p-3 rounded-xl mt-1 outline-none focus:border-blue-500 transition" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">AI मॉडल का नाम</label>
                    <input type="text" id="model-name-input" class="w-full border border-slate-200 p-3 rounded-xl mt-1 outline-none focus:border-blue-500 transition" value="google/gemini-2.0-flash-lite-preview-02-05:free">
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeSettings()" class="text-slate-400 font-medium px-4">बंद करें</button>
                <button onclick="saveSettings()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-blue-200 shadow-lg hover:bg-blue-700 transition active:scale-95">सेव करें</button>
            </div>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('pg_v3_chats')) || {};
        let currentChatId = localStorage.getItem('pg_v3_active_chat') || '';
        let apiKey = localStorage.getItem('pg_key') || '';
        let model = localStorage.getItem('pg_model') || 'google/gemini-2.0-flash-lite-preview-02-05:free';

        const chatList = document.getElementById('chat-list');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Prebuilt Thumbnail Previews (SIMULATED for demo)
        const prebuiltPreviews = {
            'https://www.youtube.com/watch?v=123': {
                title: 'गणित कक्षा 10वीं - द्विघात समीकरण (पार्ट 1)',
                image: 'https://i.ytimg.com/vi/123/hqdefault.jpg',
                domain: 'youtube.com'
            },
            'https://github.com/': {
                title: 'GitHub: जहां डेवलपर मिलते हैं',
                image: 'https://github.githubassets.com/images/modules/open_graph/github-logo.png',
                domain: 'github.com'
            },
            'http://openai.com': {
                title: 'OpenAI: AI रिसर्च और डिप्लॉयमेंट',
                image: 'https://cdn.openai.com/common/og-image-standard.png',
                domain: 'openai.com'
            }
        };

        function init() {
            document.getElementById('model-badge').innerText = model.split('/')[1] || model;
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            if (!currentChatId || !chats[currentChatId]) createNewChat();
            else updateChatUI();
        }

        function createNewChat() {
            const id = 'c' + Date.now();
            chats[id] = { id, title: 'New Chat', messages: [] };
            currentChatId = id;
            updateChatUI();
        }

        function updateChatUI() {
            localStorage.setItem('pg_v3_chats', JSON.stringify(chats));
            localStorage.setItem('pg_v3_active_chat', currentChatId);
            renderMessages();
        }

        function renderMessages() {
            chatList.innerHTML = '';
            // Default Welcome Message
            appendAiMessage("नमस्ते Beta! 🙏 मैं आपका **पॉकेट गुरु** हूँ। आज हम क्या सीखें? \n\nमुझे गणित, विज्ञान या किसी भी विषय पर पूछें, या 'गणित वीडियो' मांगें। मुझे सेटिंग्स में API कीज़ जोड़ना न भूलें!");
            
            chats[currentChatId].messages.forEach(msg => {
                if(msg.role === 'user') appendUserMessage(msg.content);
                else appendAiMessage(msg.content);
            });
            chatList.scrollTop = chatList.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            if (!apiKey) { alert("सुरक्षा नोट: पहले सेटिंग्स में अपनी API कीज़ डालें!"); openSettings(); return; }

            appendUserMessage(text);
            chats[currentChatId].messages.push({ role: 'user', content: text });
            userInput.value = '';
            userInput.style.height = 'auto';
            userInput.focus();
            chatList.scrollTop = chatList.scrollHeight;

            showTypingIndicator();

            try {
                // simulated model response
                let systemPrompt = "You are Pocket Guru, a wise teacher. Response in Hindi. Use 'Beta'. Use Markdown. If user asks for video, provide a valid youtube link format (like https://www.youtube.com/watch?v=123 for demo) and explain the topic.";

                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: "system", content: systemPrompt }, ...chats[currentChatId].messages]
                    })
                });

                const data = await res.json();
                hideTypingIndicator();

                if (data.choices && data.choices[0]) {
                    const aiContent = data.choices[0].message.content;
                    appendAiMessage(aiContent);
                    chats[currentChatId].messages.push({ role: 'ai', content: aiContent });
                    updateChatUI();
                } else {
                    throw new Error("API Error");
                }
            } catch (err) {
                hideTypingIndicator();
                appendAiMessage("❌ Sorry Beta, API या नेटवर्क एरर आ गया। एक बार अपनी सेटिंग्स चेक कर लो।");
            }
        }

        function appendUserMessage(content) {
            const bubble = document.createElement('div');
            bubble.className = "bubble user markdown-body";
            bubble.innerHTML = `<i class="fa-solid fa-person message-icon"></i> ${content}`;
            chatList.appendChild(bubble);
        }

        function appendAiMessage(content) {
            const bubble = document.createElement('div');
            bubble.className = "bubble ai markdown-body";
            
            // marked parsing and cap icon addition
            bubble.innerHTML = `<i class="fa-solid fa-graduation-cap message-icon"></i> ${marked.parse(content)}`;
            
            // handle links
            handleLinkPreviews(bubble, content);

            chatList.appendChild(bubble);
            chatList.scrollTop = chatList.scrollHeight;
        }

        function handleLinkPreviews(bubbleElement, content) {
            const urlRegex = /https?:\/\/[^\s]+/g;
            const urls = content.match(urlRegex);

            if (urls) {
                urls.forEach(url => {
                    const previewData = prebuiltPreviews[url] || prebuiltPreviews['https://www.youtube.com/watch?v='] || { title: url, image: 'https://via.placeholder.com/70x70?text=Link', domain: url.split('/')[2] };

                    if (url.includes('youtube.com/watch')) {
                        previewData.domain = 'youtube.com';
                    }

                    const previewElement = document.createElement('a');
                    previewElement.href = url;
                    previewElement.target = '_blank';
                    previewElement.className = 'link-preview';
                    previewElement.innerHTML = `
                        <img src="${previewData.image}" alt="link preview">
                        <div class="details">
                            <span class="title">${previewData.title}</span>
                            <span class="domain"><i class="fa-solid fa-link text-xs mr-1"></i>${previewData.domain}</span>
                        </div>
                    `;
                    bubbleElement.appendChild(previewElement);
                });
            }
        }

        function showTypingIndicator() { typingIndicator.classList.remove('hidden'); chatList.scrollTop = chatList.scrollHeight; }
        function hideTypingIndicator() { typingIndicator.classList.add('hidden'); chatList.scrollTop = chatList.scrollHeight; }
        function clearChat() { chats[currentChatId].messages = []; updateChatUI(); }
        function openSettings() { document.getElementById('api-key-input').value = apiKey; document.getElementById('model-name-input').value = model; document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveSettings() { apiKey = document.getElementById('api-key-input').value; model = document.getElementById('model-name-input').value; localStorage.setItem('pg_key', apiKey); localStorage.setItem('pg_model', model); closeSettings(); location.reload(); }

        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
        sendBtn.onclick = handleSend;
        document.getElementById('mic-btn').onclick = () => alert('Beta, अभी माइक्रोफ़ोन टेस्टिंग के लिए है! (अगले वर्ज़न में सक्रिय होगा)');

        window.onload = init;
    </script>
</body>
</html>
